<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign up for PodNova - Create your podcast hosting and monetization account to start publishing globally in minutes.">
    <title>Sign Up | PodNova</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>
    <div class="mesh-bg mesh-bg-1"></div>
    <div class="mesh-bg mesh-bg-2"></div>    <!-- Floating Theme/RTL Controls -->
    <div style="position: absolute; top: 1.5rem; right: 1.5rem; display: flex; gap: 0.5rem; z-index: 50;">
        <button class="btn-icon theme-toggle" id="theme-toggle" title="Toggle Theme">☀️</button>
        <button class="btn-icon rtl-toggle" id="rtl-toggle" title="Toggle Layout Direction">⇄</button>
    </div>
    <main style="min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 4rem 2rem;">
        <div class="glass-card" style="padding: 3rem; max-width: 500px; width: 100%; text-align: left;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <a href="index.html" class="logo-container" style="justify-content: center; margin-bottom: 0.5rem; text-decoration:none;">
                    <div class="logo-icon">P</div>
                    <span>PodNova</span>
                </a>
                <p style="color: var(--text-secondary); font-size: 0.9rem;">Start your 14-day free Creator Pro trial.</p>
            </div>

            <!-- Signup Form redirects to dashboard.html to simulate successful onboarding -->
            <form onsubmit="event.preventDefault(); window.location.href='dashboard.html';" style="display:flex; flex-direction:column; gap:1.25rem;">
                <div>
                    <label style="display:block; font-size:0.85rem; font-weight:700; margin-bottom:0.5rem;">Creator Name</label>
                    <input type="text" name="creator-name" autocomplete="off" required placeholder="e.g. Sarah Mitchell" class="glass-card" style="width:100%; padding:0.75rem; background:var(--bg-tertiary); color:var(--text-primary); border-color:var(--border-color);">
                </div>
                <div>
                    <label style="display:block; font-size:0.85rem; font-weight:700; margin-bottom:0.5rem;">Podcast Show Title</label>
                    <input type="text" name="show-title" autocomplete="off" required placeholder="e.g. The Daily Tech Lab" class="glass-card" style="width:100%; padding:0.75rem; background:var(--bg-tertiary); color:var(--text-primary); border-color:var(--border-color);">
                </div>
                <div>
                    <label style="display:block; font-size:0.85rem; font-weight:700; margin-bottom:0.5rem;">Email Address</label>
                    <input type="email" name="email" autocomplete="off" required placeholder="you@example.com" class="glass-card" style="width:100%; padding:0.75rem; background:var(--bg-tertiary); color:var(--text-primary); border-color:var(--border-color);">
                </div>
                <div>
                    <label style="display:block; font-size:0.85rem; font-weight:700; margin-bottom:0.5rem;">Password</label>
                    <div style="position: relative;">
                        <input type="password" id="signup-password" required placeholder="••••••••" class="glass-card" style="width:100%; padding:0.75rem 2.5rem 0.75rem 0.75rem; background:var(--bg-tertiary); color:var(--text-primary); border-color:var(--border-color);">
                        <button type="button" onclick="const p = document.getElementById('signup-password'); p.type = p.type === 'password' ? 'text' : 'password'; this.innerHTML = p.type === 'password' ? '👁️' : '🙈';" style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); border: none; background: none; cursor: pointer; color: var(--text-muted); font-size: 1.1rem; line-height: 1; padding: 0; display: flex; align-items: center;">👁️</button>
                    </div>
                </div>
                <div>
                    <label style="display:block; font-size:0.85rem; font-weight:700; margin-bottom:0.5rem;">Confirm Password</label>
                    <div style="position: relative;">
                        <input type="password" id="signup-confirm-password" required placeholder="••••••••" class="glass-card" style="width:100%; padding:0.75rem 2.5rem 0.75rem 0.75rem; background:var(--bg-tertiary); color:var(--text-primary); border-color:var(--border-color);">
                        <button type="button" onclick="const p = document.getElementById('signup-confirm-password'); p.type = p.type === 'password' ? 'text' : 'password'; this.innerHTML = p.type === 'password' ? '👁️' : '🙈';" style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); border: none; background: none; cursor: pointer; color: var(--text-muted); font-size: 1.1rem; line-height: 1; padding: 0; display: flex; align-items: center;">👁️</button>
                    </div>
                </div>
                <div>
                    <label style="display:block; font-size:0.85rem; font-weight:700; margin-bottom:0.5rem;">Creator Focus</label>
                    <select class="glass-card" style="width:100%; padding:0.75rem; background:var(--bg-tertiary); color:var(--text-primary); border-color:var(--border-color); cursor:pointer;">
                        <option>Independent Producer</option>
                        <option>Podcast Network</option>
                        <option>Business / Media Company</option>
                        <option>Educator / Coach</option>
                    </select>
                </div>
                <div>
                    <label style="display:flex; align-items:flex-start; gap:0.5rem; font-size:0.8rem; color:var(--text-secondary); cursor:pointer; margin-top: 0.25rem;">
                        <input type="checkbox" required style="accent-color:var(--primary); margin-top: 0.2rem;">
                        <span>I agree to the <a href="#" style="color:var(--primary); font-weight:700;">Terms of Service</a> & <a href="#" style="color:var(--primary); font-weight:700;">Privacy Policy</a></span>
                    </label>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Create Account & Launch Studio 🚀</button>
            </form>

            <!-- Social Divider -->
            <div style="display:flex; align-items:center; gap:1rem; margin: 1.5rem 0; color:var(--text-muted); font-size:0.8rem;">
                <span style="flex:1; height:1px; background:var(--border-color);"></span>
                <span>or continue with</span>
                <span style="flex:1; height:1px; background:var(--border-color);"></span>
            </div>

            <!-- Social Logins -->
            <div style="display:flex; gap:1rem; justify-content:center; margin-bottom: 1.5rem;">
                <a href="#" class="btn-icon" title="Google" style="width:44px; height:44px;">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                        <path d="M12.24 10.285V14.4h6.887c-.648 2.41-2.519 4.114-5.136 4.114A5.99 5.99 0 0 1 8 12.5a5.99 5.99 0 0 1 5.99-6.012c1.49 0 2.859.547 3.916 1.446l3.208-3.209C19.167 2.89 16.732 2 13.99 2 8.18 2 3.5 6.7 3.5 12.5S8.18 23 13.99 23c5.448 0 9.873-3.87 9.873-9.585 0-.702-.074-1.419-.224-2.13H12.24Z"/>
                    </svg>
                </a>
                <a href="#" class="btn-icon" title="Apple" style="width:44px; height:44px;">
                    <svg viewBox="0 0 384 512" width="15" height="20" fill="currentColor">
                        <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 47.5-24.4 76.5 26.9 2.4 51.2-16 68.3-38.9z"/>
                    </svg>
                </a>
                <a href="#" class="btn-icon" title="GitHub" style="width:44px; height:44px;">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                        <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
                    </svg>
                </a>
            </div>
            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-muted);">
                Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 700;">Login</a>
            </p>
        </div>
    </main>

    <footer style="border-top: 1px solid var(--border-color); padding: 4rem 2rem; background: var(--bg-secondary);">
        <div style="max-width: 1400px; margin: 0 auto; text-align: center; font-size: 0.85rem; color: var(--text-muted);">
            © 2026 PodNova SaaS Platform. Signup Portal.
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
